<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>إدارة المبنى</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#fafafa;
  color:#333;
}

.dash{
  padding:1.25rem 1rem;
  direction:rtl;
  font-family:'Segoe UI',Tahoma,Arial,sans-serif
}

.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:1.25rem;
  flex-wrap:wrap;
  gap:8px
}

.top-bar h1{
  font-size:19px;
  font-weight:500;
  color:#111
}

.badge{
  display:inline-block;
  font-size:11px;
  padding:3px 10px;
  border-radius:20px;
  white-space:nowrap
}

.b-admin{background:#d4edda;color:#155724}
.b-view{background:#cce5ff;color:#004085}
.b-neighbor{background:#fff3cd;color:#856404}

.b-paid{background:#EAF3DE;color:#3B6D11}
.b-pending{background:#FAEEDA;color:#854F0B}
.b-empty{background:#e9ecef;color:#6c757d}
.b-unknown{background:#FCEBEB;color:#791F1F}
.b-open{background:#EAF3DE;color:#3B6D11}
.b-invest{background:#E6F1FB;color:#0C447C}
.b-done{background:#EAF3DE;color:#3B6D11}

.pin-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:1.25rem;
  flex-wrap:wrap
}

.pin-row input{
  width:280px;
  font-size:13px;
  padding:5px 10px;
  border-radius:6px;
  border:0.5px solid #ced4da;
  background:#fff;
  color:#000;
  direction:ltr
}

.pin-row button,
.issues-form button,
.detail-card button,
#saveExpRow button{
  padding:6px 12px;
  font-size:12px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer
}

.pin-row button:hover{
  background:#0056b3
}

.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:8px;
  margin-bottom:1.25rem
}

.mc{
  background:#fff;
  border:0.5px solid #dee2e6;
  border-radius:6px;
  padding:12px 10px
}

.mc .lbl{
  font-size:11px;
  color:#6c757d;
  margin-bottom:3px
}

.mc .val{
  font-size:20px;
  font-weight:500;
  color:#111
}

.tabs{
  display:flex;
  gap:6px;
  margin-bottom:1rem;
  flex-wrap:wrap
}

.tab{
  font-size:12px;
  padding:5px 12px;
  border-radius:6px;
  cursor:pointer;
  border:0.5px solid #ced4da;
  background:#fff;
  color:#495057
}

.tab.active{
  background:#007bff;
  color:#fff;
  border-color:#007bff
}

.tab-content{display:none}
.tab-content.active{display:block}

.card{
  background:#fff;
  border:0.5px solid #dee2e6;
  border-radius:8px;
  padding:1rem 1.25rem;
  margin-bottom:1.25rem
}

.sec-title{
  font-size:15px;
  font-weight:500;
  color:#111;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px
}

.flat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(68px,1fr));
  gap:7px;
  margin-bottom:1.25rem
}

.fc{
  border-radius:6px;
  padding:9px 5px;
  text-align:center;
  border:0.5px solid #dee2e6;
  background:#fff;
  transition:transform .1s
}

.fc .fn{
  font-size:14px;
  font-weight:500
}

.fc .fs{
  font-size:10px;
  margin-top:2px
}

.fc-paid{
  background:#EAF3DE;
  border-color:#97C459
}

.fc-paid .fn,
.fc-paid .fs{
  color:#3B6D11
}

.fc-pending{
  background:#FAEEDA;
  border-color:#EF9F27
}

.fc-pending .fn,
.fc-pending .fs{
  color:#854F0B
}

.fc-empty{
  background:#f8f9fa
}

.fc-empty .fn,
.fc-empty .fs{
  color:#6c757d
}

.fc-unknown{
  background:#FCEBEB;
  border-color:#F09595
}

.fc-unknown .fn,
.fc-unknown .fs{
  color:#791F1F
}

.legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:1rem;
  font-size:11px;
  color:#6c757d
}

.li{
  display:flex;
  align-items:center;
  gap:4px
}

.ld{
  width:11px;
  height:11px;
  border-radius:3px
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px
}

th{
  background:#f8f9fa;
  color:#495057;
  font-weight:500;
  padding:7px 9px;
  text-align:right;
  border-bottom:0.5px solid #dee2e6
}

td{
  padding:7px 9px;
  border-bottom:0.5px solid #dee2e6;
  color:#212529;
  vertical-align:middle
}

tr:last-child td{
  border-bottom:none
}

.flat-select{
  font-size:12px;
  padding:3px 7px;
  border-radius:4px;
  border:0.5px solid #ced4da;
  background:#fff;
  color:#495057
}

.detail-card{
  background:#f8f9fa;
  border-radius:6px;
  padding:12px;
  margin-bottom:1rem;
  display:none;
  border:0.5px solid #dee2e6;
}

.notif{
  font-size:11px;
  color:#28a745;
  opacity:0;
  transition:opacity .3s
}

.notif.show{
  opacity:1
}

.issues-form{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:1rem;
  padding:12px;
  background:#f8f9fa;
  border-radius:6px;
  border:0.5px solid #dee2e6;
}

.issues-form input{
  font-size:13px;
  padding:5px;
  border:0.5px solid #ced4da;
  border-radius:4px;
}

.exp-input{
  background:transparent;
  border:none;
  border-bottom:0.5px solid #ced4da;
  width:80px;
  font-size:12px;
  color:#000;
  text-align:right;
  padding:1px 2px
}

.loading-overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  font-size:14px;
  color:#6c757d;
  flex-direction:column;
  gap:12px
}

.spinner{
  width:32px;
  height:32px;
  border:3px solid #e9ecef;
  border-top-color:#007bff;
  border-radius:50%;
  animation:spin .8s linear infinite
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <span id="loadingText">جاري تحميل البيانات...</span>
</div>

<div class="dash" id="app" style="opacity:0;transition:opacity .3s">

  <div class="top-bar">

    <div>
      <div style="font-size:12px;color:#6c757d;margin-bottom:3px">
        لوحة إدارة المبنى
      </div>

      <h1>
        <i class="ti ti-building"></i>
        إدارة المبنى
      </h1>
    </div>

    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">

      <span class="badge b-view" id="modeBadge">
        وضع المشاهدة
      </span>

      <span class="badge b-admin" id="adminBadge" style="display:none">
        مدير
      </span>

      <span class="badge b-neighbor" id="neighborBadge" style="display:none">
        جار - إضافة مشاكل فقط
      </span>

      <span style="font-size:11px;color:#6c757d" id="lastUpdated"></span>

    </div>
  </div>

  <div class="pin-row">

    <input
      type="password"
      id="tokenInput"
      placeholder="أدخل كود الإدارة أو 1234 لإضافة شكوى فقط"
    />

    <button onclick="login()">
      <i class="ti ti-key"></i>
      تفعيل
    </button>

    <button
      onclick="logout()"
      id="logoutBtn"
      style="display:none;background:#dc3545;"
    >
      خروج
    </button>

    <button
      onclick="loadData()"
      style="font-size:11px;padding:4px 10px;background:#17a2b8"
    >
      <i class="ti ti-refresh"></i>
      تحديث
    </button>

    <span class="notif" id="loginNotif">تم ✓</span>

  </div>

  <div class="metrics" id="metricsRow"></div>

  <div class="tabs">

    <button class="tab active" onclick="switchTab('payments',this)">
      <i class="ti ti-coin"></i>
      المدفوعات
    </button>

    <button class="tab" onclick="switchTab('issues',this)">
      <i class="ti ti-tool"></i>
      المشاكل
    </button>

    <button class="tab" onclick="switchTab('expenses',this)">
      <i class="ti ti-receipt"></i>
      المصاريف
    </button>

  </div>

  <!-- PAYMENTS -->

  <div id="tab-payments" class="tab-content active">

    <div class="sec-title">
      <i class="ti ti-home"></i>
      حالة الشقق
    </div>

    <div class="legend">

      <div class="li">
        <div class="ld" style="background:#97C459"></div>
        دفع
      </div>

      <div class="li">
        <div class="ld" style="background:#EF9F27"></div>
        وافق / لم يدفع
      </div>

      <div class="li">
        <div class="ld" style="background:#F09595"></div>
        لم نصل إليه
      </div>

      <div class="li">
        <div class="ld" style="background:#f8f9fa;border:0.5px solid #dee2e6"></div>
        فارغة
      </div>

    </div>

    <!-- ONLY COLORS GRID -->
    <div class="flat-grid" id="flatGrid"></div>

    <div class="detail-card" id="detailCard"></div>

  </div>

  <!-- ISSUES -->

  <div id="tab-issues" class="tab-content">

    <div class="issues-form">

      <div style="font-size:13px;font-weight:500;color:#111">
        إضافة مشكلة جديدة
      </div>

      <div style="font-size:11px;color:#6c757d">
        لو أنت جار فقط أدخل 1234 علشان تقدر تضيف شكوى
      </div>

      <div style="display:flex;gap:8px">

        <input
          type="text"
          id="newIssueText"
          placeholder="وصف المشكلة..."
          style="flex:1;"
        />

        <button onclick="addIssue()">
          <i class="ti ti-plus"></i>
          إضافة
        </button>

      </div>

      <span class="notif" id="issueNotif">
        تمت الإضافة ✓
      </span>

    </div>

    <div class="card">

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>المشكلة</th>
            <th>الحالة</th>
            <th id="issueEditCol" style="display:none">تعديل</th>
          </tr>
        </thead>

        <tbody id="issuesTbody"></tbody>

      </table>

    </div>

  </div>

  <!-- EXPENSES -->

  <div id="tab-expenses" class="tab-content">

    <div class="sec-title">
      <i class="ti ti-wallet"></i>
      المصاريف الشهرية
    </div>

    <div class="card">

      <table>

        <thead>
          <tr>
            <th>البند</th>
            <th>المبلغ</th>
          </tr>
        </thead>

        <tbody id="expTbody"></tbody>

        <tfoot>
          <tr>
            <td style="font-weight:500">الإجمالي</td>
            <td id="expTotal"></td>
          </tr>
        </tfoot>

      </table>

      <div id="saveExpRow" style="margin-top:12px;display:none">

        <button onclick="saveExpenses()">
          <i class="ti ti-device-floppy"></i>
          حفظ المصاريف
        </button>

        <span class="notif" id="expNotif">تم الحفظ ✓</span>

      </div>

    </div>

  </div>

</div>

<script>

// ================= GITHUB =================

const GH_OWNER = "abdo78-max";
const GH_REPO  = "Building_162";
const GH_PATH  = "data.json";

// جار
const NEIGHBOR_PASSWORD = "1234";
const NEIGHBOR_TOKEN = "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";

// =========================================

let role = "viewer"; // viewer | neighbor | admin

let fileSha = "";

let flats = [];
let issues = [];
let expenses = [];

const statusLabel = {
  agreed:"وافق على الدفع",
  empty:"لا أحد",
  maybe:"ربما لا أحد",
  unknown:"لم نصل إليه"
};

// ================= LOGIN =================

function login(){

  const value = document.getElementById('tokenInput').value.trim();

  // Neighbor
  if(value === NEIGHBOR_PASSWORD){

    role = "neighbor";

    flash('loginNotif');

    applyRoleUI();

    return;
  }

  // Admin
  if(value){

    role = "admin";

    flash('loginNotif');

    applyRoleUI();

    return;
  }

}

function logout(){

  role = "viewer";

  document.getElementById('tokenInput').value = '';

  applyRoleUI();

  closeDetail();

  renderAll();
}

function applyRoleUI(){

  const modeBadge = document.getElementById('modeBadge');

  const adminBadge = document.getElementById('adminBadge');

  const neighborBadge = document.getElementById('neighborBadge');

  if(role === "viewer"){

    modeBadge.textContent = "وضع المشاهدة";
    modeBadge.className = "badge b-view";

    adminBadge.style.display = "none";
    neighborBadge.style.display = "none";

    document.getElementById('logoutBtn').style.display = "none";
    document.getElementById('saveExpRow').style.display = "none";
    document.getElementById('issueEditCol').style.display = "none";
  }

  else if(role === "neighbor"){

    modeBadge.textContent = "وضع الجار";
    modeBadge.className = "badge b-neighbor";

    adminBadge.style.display = "none";
    neighborBadge.style.display = "inline-block";

    document.getElementById('logoutBtn').style.display = "inline-block";
    document.getElementById('saveExpRow').style.display = "none";
    document.getElementById('issueEditCol').style.display = "none";
  }

  else{

    modeBadge.textContent = "وضع الإدارة";
    modeBadge.className = "badge b-admin";

    adminBadge.style.display = "inline-block";
    neighborBadge.style.display = "none";

    document.getElementById('logoutBtn').style.display = "inline-block";
    document.getElementById('saveExpRow').style.display = "block";
    document.getElementById('issueEditCol').style.display = "table-cell";
  }

  renderAll();
}

// ================= HELPERS =================

function getCurrentToken(){

  if(role === "neighbor"){
    return NEIGHBOR_TOKEN;
  }

  if(role === "admin"){
    return document.getElementById('tokenInput').value.trim();
  }

  return "";
}

function flash(id){

  const el = document.getElementById(id);

  if(el){

    el.classList.add('show');

    setTimeout(()=>{
      el.classList.remove('show');
    },2000);
  }
}

// ================= LOAD =================

async function loadData(){

  document.getElementById('loadingOverlay').style.display='flex';

  try{

    const response = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?t=${Date.now()}`
    );

    const json = await response.json();

    fileSha = json.sha;

    const decodedText = decodeURIComponent(
      atob(json.content)
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
    );

    const serverData = JSON.parse(decodedText);

    flats = serverData.flats || [];
    issues = serverData.issues || [];
    expenses = serverData.expenses || [];

    if(serverData.lastUpdated){

      document.getElementById('lastUpdated').textContent =
        'آخر تحديث: ' + serverData.lastUpdated;
    }

    renderAll();

  }catch(e){

    console.error(e);

    alert("فشل تحميل البيانات");
  }

  document.getElementById('loadingOverlay').style.display='none';

  document.getElementById('app').style.opacity='1';
}

// ================= SAVE =================

async function persistAll(){

  const token = getCurrentToken();

  if(!token){

    alert("ليس لديك صلاحية للحفظ");

    return;
  }

  const now = new Date().toLocaleDateString(
    'ar-EG',
    {
      year:'numeric',
      month:'long',
      day:'numeric',
      hour:'2-digit',
      minute:'2-digit'
    }
  );

  const payload = {
    flats,
    issues,
    expenses,
    lastUpdated: now
  };

  const jsonString = JSON.stringify(payload,null,2);

  const base64Content = btoa(
    encodeURIComponent(jsonString).replace(
      /%([0-9A-F]{2})/g,
      function(match,p1){
        return String.fromCharCode('0x'+p1);
      }
    )
  );

  const response = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
    {
      method:'PUT',

      headers:{
        'Authorization': `token ${token}`,
        'Content-Type':'application/json',
        'Accept':'application/vnd.github+json'
      },

      body: JSON.stringify({
        message:`update ${now}`,
        content:base64Content,
        sha:fileSha
      })
    }
  );

  if(!response.ok){

    const txt = await response.text();

    console.error(txt);

    alert("فشل الحفظ");

    return;
  }

  const resJson = await response.json();

  fileSha = resJson.content.sha;

  document.getElementById('lastUpdated').textContent =
    'آخر تحديث: ' + now;
}

// ================= TABS =================

function switchTab(id,btn){

  document.querySelectorAll('.tab-content')
    .forEach(t=>t.classList.remove('active'));

  document.querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

  document.getElementById('tab-'+id)
    .classList.add('active');

  btn.classList.add('active');
}

// ================= PAYMENTS =================

function fcClass(f){

  if(f.paid) return 'fc fc-paid';

  if(f.status==='agreed') return 'fc fc-pending';

  if(f.status==='unknown') return 'fc fc-unknown';

  return 'fc fc-empty';
}

function fcLabel(f){

  if(f.paid) return 'دفع';

  if(f.status==='agreed') return 'لم يدفع';

  if(f.status==='unknown') return 'لم نصل';

  return 'فارغة';
}

function renderGrid(){

  const g = document.getElementById('flatGrid');

  g.innerHTML='';

  flats.forEach(f=>{

    const d = document.createElement('div');

    d.className = fcClass(f);

    d.innerHTML = `
      <div class="fn">${f.id}</div>
      <div class="fs">${fcLabel(f)}</div>
    `;

    if(role === "admin"){
      d.style.cursor = "pointer";
      d.onclick = ()=>openDetail(f);
    }

    g.appendChild(d);
  });
}

function openDetail(f){

  if(role !== "admin") return;

  const c = document.getElementById('detailCard');

  c.style.display='block';

  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">

      <strong>شقة ${f.id}</strong>

      <button
        onclick="closeDetail()"
        style="background:#6c757d;padding:3px 8px"
      >
        ✕
      </button>

    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">

      <select class="flat-select" id="ds_${f.id}">
        <option value="empty" ${f.status==='empty'?'selected':''}>لا أحد</option>
        <option value="maybe" ${f.status==='maybe'?'selected':''}>ربما لا أحد</option>
        <option value="agreed" ${f.status==='agreed'?'selected':''}>وافق</option>
        <option value="unknown" ${f.status==='unknown'?'selected':''}>لم نصل</option>
      </select>

      <select class="flat-select" id="dp_${f.id}">
        <option value="false" ${!f.paid?'selected':''}>لم يدفع</option>
        <option value="true" ${f.paid?'selected':''}>دفع</option>
      </select>

      <button onclick="saveFlatDetail(${f.id})">
        حفظ
      </button>

    </div>
  `;
}

function closeDetail(){

  document.getElementById('detailCard').style.display='none';
}

async function saveFlatDetail(id){

  if(role !== "admin") return;

  const f = flats.find(x=>x.id===id);

  f.status = document.getElementById('ds_'+id).value;

  f.paid = document.getElementById('dp_'+id).value === 'true';

  await persistAll();

  renderAll();

  openDetail(f);
}

// ================= ISSUES =================

function renderIssues(){

  const tb = document.getElementById('issuesTbody');

  tb.innerHTML='';

  const stMap = {
    pending:'<span class="badge b-pending">انتظار</span>',
    open:'<span class="badge b-open">مفتوحة</span>',
    investigating:'<span class="badge b-invest">جارٍ</span>',
    done:'<span class="badge b-done">منجزة</span>'
  };

  issues.forEach(iss=>{

    let editTd = '';

    if(role === "admin"){

      editTd = `
        <td>

          <select
            class="flat-select"
            onchange="changeIssueStatus(${iss.id},this.value)"
          >

            <option value="pending" ${iss.status==='pending'?'selected':''}>
              انتظار
            </option>

            <option value="investigating" ${iss.status==='investigating'?'selected':''}>
              جارٍ
            </option>

            <option value="open" ${iss.status==='open'?'selected':''}>
              مفتوحة
            </option>

            <option value="done" ${iss.status==='done'?'selected':''}>
              منجزة
            </option>

          </select>

        </td>
      `;
    }

    tb.innerHTML += `
      <tr>
        <td>${iss.id}</td>
        <td>${iss.text}</td>
        <td>${stMap[iss.status] || ''}</td>
        ${editTd}
      </tr>
    `;
  });
}

async function changeIssueStatus(id,val){

  if(role !== "admin") return;

  const iss = issues.find(x=>x.id===id);

  if(iss){

    iss.status = val;

    await persistAll();

    renderIssues();
  }
}

async function addIssue(){

  if(role !== "neighbor" && role !== "admin"){

    alert("أدخل 1234 أو كود الإدارة لإضافة مشكلة");

    return;
  }

  const txt = document.getElementById('newIssueText').value.trim();

  if(!txt) return;

  issues.push({
    id: issues.length + 1,
    text: txt,
    pri:'med',
    status:'pending'
  });

  document.getElementById('newIssueText').value='';

  await persistAll();

  flash('issueNotif');

  renderIssues();
}

// ================= EXPENSES =================

function renderExpenses(){

  const tb = document.getElementById('expTbody');

  tb.innerHTML='';

  expenses.forEach((e,i)=>{

    tb.innerHTML += `
      <tr>

        <td>${e.label}</td>

        <td>

          ${
            role === "admin"

            ? `
              <input
                class="exp-input"
                type="number"
                value="${e.amount}"
                min="0"
                oninput="expenses[${i}].amount=+this.value;updateExpTotal()"
              />
            `

            : `
              <span>${Number(e.amount).toLocaleString()} ج</span>
            `
          }

        </td>

      </tr>
    `;
  });

  updateExpTotal();
}

function updateExpTotal(){

  document.getElementById('expTotal').textContent =
    expenses.reduce((s,e)=>s+Number(e.amount),0).toLocaleString() + ' ج';
}

async function saveExpenses(){

  if(role !== "admin") return;

  await persistAll();

  flash('expNotif');
}

// ================= METRICS =================

function renderMetrics(){

  const agreed = flats.filter(f=>f.status==='agreed').length;

  const paid = flats.filter(f=>f.paid).length;

  const empty = flats.filter(
    f=>f.status==='empty'||f.status==='maybe'
  ).length;

  const doneIss = issues.filter(
    i=>i.status==='done'
  ).length;

  document.getElementById('metricsRow').innerHTML = `

    <div class="mc">
      <div class="lbl">إجمالي الشقق</div>
      <div class="val">${flats.length}</div>
    </div>

    <div class="mc">
      <div class="lbl">الموافقين</div>
      <div class="val">${agreed}</div>
    </div>

    <div class="mc">
      <div class="lbl">المسددين</div>
      <div class="val">${paid}</div>
    </div>

    <div class="mc">
      <div class="lbl">الشقق الفارغة</div>
      <div class="val">${empty}</div>
    </div>

    <div class="mc">
      <div class="lbl">المشاكل المنجزة</div>
      <div class="val">${doneIss}/${issues.length}</div>
    </div>
  `;
}

// ================= RENDER =================

function renderAll(){

  renderMetrics();

  renderGrid();

  renderIssues();

  renderExpenses();
}

// ================= START =================

applyRoleUI();

loadData();

</script>
