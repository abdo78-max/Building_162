```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المبنى</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0
}

body{
background:#fafafa;
color:#333;
font-family:'Segoe UI',Tahoma,Arial,sans-serif;
direction:rtl;
padding:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.b-admin{
background:#d4edda;
color:#155724;
}

.b-view{
background:#cce5ff;
color:#004085;
}

.b-neighbor{
background:#fff3cd;
color:#856404;
}

.pin-row{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.pin-row input{
padding:8px 10px;

}

border:none;

button:hover{
opacity:.9;
}

}

}

}

.issues-form{

.issues-form input{

}

.notif{

}

.notif.show{

}

.loading{
position:fixed;
inset:0;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
font-size:18px;
}

</style>
</head>

<body>

<div id="loading" class="loading">
جاري التحميل...
</div>

<div class="top-bar">

<div>
<h2>إدارة المبنى</h2>
</div>

<div>
<span class="badge b-view" id="modeBadge">
وضع المشاهدة
</span>
</div>

</div>

<input
type="password"
id="tokenInput"
placeholder="اكتب التوكن أو 1234"
/>

<button onclick="saveTokenAndLogin()">
دخول
</button>

id="logoutBtn"

</button>

</span>

</div>

</h3>

/>

إضافة مشكلة
</button>

</span>

</div>

<tr>

</tr>
</thead>

<tbody id="issuesTbody"></tbody>

</table>

</div>

<script>

// ======================
// github
// ======================

const GH_OWNER = "abdo78-max";
const GH_REPO  = "Building_162";
const GH_PATH  = "data.json";

// neighbor code
const GUEST_PIN = "1234";

// neighbor github token
const NEIGHBOR_TOKEN =
"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";

// ======================

let isAdmin = false;
let isNeighbor = false;

let fileSha = "";

let flats = [];
let issues = [];
let expenses = [];

// ======================

function flash(id){

const el = document.getElementById(id);

el.classList.add('show');

setTimeout(()=>{
el.classList.remove('show');
},2000);

}

// ======================

function saveTokenAndLogin(){

const tok =
document.getElementById('tokenInput').value.trim();

if(!tok)return;

localStorage.setItem('gh_bldg_token',tok);

checkTokenState();

loadData();

flash('loginNotif');

}

// ======================

function logout(){

localStorage.removeItem('gh_bldg_token');

document.getElementById('tokenInput').value='';

checkTokenState();

}

// ======================

function checkTokenState(){

const stored =
localStorage.getItem('gh_bldg_token') || "";

// ======================
// neighbor
// ======================

if(stored === GUEST_PIN){

isAdmin = false;
isNeighbor = true;

document.getElementById('modeBadge').textContent =
"وضع الجار";

document.getElementById('modeBadge').className =
"badge b-neighbor";

document.getElementById('issueForm').style.display =
"flex";

document.getElementById('logoutBtn').style.display =
"inline-block";

}

// ======================
// admin
// ======================

else if(stored){

isAdmin = true;
isNeighbor = false;

document.getElementById('modeBadge').textContent =
"وضع الإدارة";

document.getElementById('modeBadge').className =
"badge b-admin";

document.getElementById('issueForm').style.display =
"flex";

document.getElementById('logoutBtn').style.display =
"inline-block";

}

// ======================
// read only
// ======================

else{

isAdmin = false;
isNeighbor = false;

document.getElementById('modeBadge').textContent =
"وضع المشاهدة";

document.getElementById('modeBadge').className =
"badge b-view";

document.getElementById('issueForm').style.display =
"none";

document.getElementById('logoutBtn').style.display =
"none";

}

}

// ======================

function getActiveToken(){

const stored =
localStorage.getItem('gh_bldg_token') || "";

// neighbor uses fixed github token
if(stored === GUEST_PIN){
return NEIGHBOR_TOKEN;
}

// admin token
return stored;

}

// ======================

async function loadData(){

document.getElementById('loading').style.display='flex';

const token = getActiveToken();

const headers = {
"Accept":"application/vnd.github+json"
};

if(token){
headers["Authorization"]=`token ${token}`;
}

try{

const response = await fetch(
`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?t=${Date.now()}`,
{
headers
}
);

const json = await response.json();

fileSha = json.sha;

const decoded = decodeURIComponent(
atob(json.content)
.split('')
.map(c =>
'%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
)
.join('')
);

const data = JSON.parse(decoded);

issues = data.issues || [];
flats = data.flats || [];
expenses = data.expenses || [];

renderIssues();

}catch(e){

console.error(e);

}

document.getElementById('loading').style.display='none';

}

// ======================

async function persistAll(){

const token = getActiveToken();

if(!token){

alert("قراءة فقط");

return;

}

const payload = {
flats,
issues,
expenses,
lastUpdated:new Date().toLocaleString('ar-EG')
};

const jsonString =
JSON.stringify(payload,null,2);

const base64Content = btoa(
encodeURIComponent(jsonString)
.replace(
/%([0-9A-F]{2})/g,
function(match,p1){
return String.fromCharCode('0x' + p1);
}
)
);

try{

const response = await fetch(
`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
{
method:'PUT',

headers:{
'Authorization':`token ${token}`,
'Content-Type':'application/json',
'Accept':'application/vnd.github+json'
},

body:JSON.stringify({
message:'update data',
content:base64Content,
sha:fileSha
})
}
);

if(response.ok){

const res = await response.json();

fileSha = res.content.sha;

}else{

alert("فشل الحفظ");

}

}catch(e){

alert("خطأ اتصال");

}

}

// ======================

function renderIssues(){

const tb =
document.getElementById('issuesTbody');

tb.innerHTML='';

issues.forEach(iss=>{

tb.innerHTML += `
<tr>
<td>${iss.id}</td>
<td>${iss.text}</td>
<td>${iss.status}</td>
</tr>
`;

});

}

// ======================

async function addIssue(){

const txt =
document.getElementById('newIssueText').value.trim();

if(!txt)return;

issues.push({
id:issues.length+1,
text:txt,
status:'pending'
});

document.getElementById('newIssueText').value='';

await persistAll();

renderIssues();

flash('issueNotif');

}

// ======================

checkTokenState();

loadData();

// ======================

</script>

</body>
</html>
