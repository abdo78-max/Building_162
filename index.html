<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الشكاوى والمدفوعات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background: #f5f7fa;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .neighbor-auth {
            background: #eef6ff;
            border: 1px solid #b8daff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .neighbor-auth input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            width: 180px;
            margin-left: 10px;
        }
        .neighbor-auth button {
            padding: 8px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .hint {
            color: #0056b3;
            font-size: 0.9em;
            margin-right: 10px;
        }
        .complaint-form {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .complaint-form textarea, .complaint-form input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .complaint-form button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .status-msg {
            margin-top: 10px;
            font-weight: bold;
            color: #28a745;
        }
        .payments-section {
            background: #e2f5ea;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 20px;
        }
        .payment-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .payment-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        .color-square {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 1px solid #aaa;
        }
        /* الألوان فقط، دون نصوص إضافية */
        .paid { background-color: #28a745; }
        .pending { background-color: #ffc107; }
        .overdue { background-color: #dc3545; }
        .na { background-color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <h2>نظام الجيران - تقديم شكوى</h2>

    <!-- خانة إدخال رمز الجار مع اقتراح -->
    <div class="neighbor-auth">
        <label for="neighborCode"><strong>رمز الجار:</strong></label>
        <input type="password" id="neighborCode" placeholder="أدخل الرمز" maxlength="4">
        <button onclick="authenticateNeighbor()">تأكيد</button>
        <span class="hint">💡 أدخل <strong>1234</strong> إذا كنت تريد تقديم شكوى</span>
        <p id="authStatus" style="margin-top:10px; color: green;"></p>
    </div>

    <!-- نموذج الشكوى (يظهر بعد التحقق) -->
    <div id="complaintSection" class="complaint-form" style="display: none;">
        <h3>تقديم شكوى جديدة</h3>
        <input type="text" id="complaintTitle" placeholder="عنوان الشكوى">
        <textarea id="complaintBody" rows="4" placeholder="وصف الشكوى..."></textarea>
        <button onclick="submitComplaint()">إرسال الشكوى</button>
        <p id="complaintStatus" class="status-msg"></p>
    </div>

    <h2>حالة الدفعات (بالألوان فقط)</h2>
    <div class="payments-section">
        <p>تظهر حالة كل شقة بلون المربع فقط:</p>
        <div class="payment-grid" id="paymentGrid">
            <!-- ستُملأ ديناميكياً -->
        </div>
    </div>
</div>

<script>
    // ========== الإعدادات – عدّلها بما يناسب مستودعك على GitHub ==========
    const REPO_OWNER = "YOUR_GITHUB_USERNAME";       // غيّر إلى اسم المستخدم الخاص بك
    const REPO_NAME = "YOUR_REPO_NAME";             // غيّر إلى اسم المستودع
    // ====================================================================

    // التوكن الخاص بالجار (يُستخدم فقط عند إدخال 1234)
    const NEIGHBOR_TOKEN = "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";

    let isNeighborAuthenticated = false;

    // عند الضغط على تأكيد رمز الجار
    function authenticateNeighbor() {
        const code = document.getElementById('neighborCode').value.trim();
        const statusEl = document.getElementById('authStatus');
        if (code === '1234') {
            isNeighborAuthenticated = true;
            statusEl.textContent = '✅ تم التحقق، يمكنك الآن تقديم شكوى.';
            statusEl.style.color = 'green';
            document.getElementById('complaintSection').style.display = 'block';
        } else {
            isNeighborAuthenticated = false;
            statusEl.textContent = '❌ الرمز غير صحيح.';
            statusEl.style.color = 'red';
            document.getElementById('complaintSection').style.display = 'none';
        }
        // لا تخزين محلي مطلقاً
    }

    // تقديم الشكوى وحفظها كـ GitHub issue مع label "waiting"
    async function submitComplaint() {
        if (!isNeighborAuthenticated) {
            alert('يجب التحقق من رمز الجار أولاً (1234).');
            return;
        }

        const title = document.getElementById('complaintTitle').value.trim();
        const body = document.getElementById('complaintBody').value.trim();
        if (!title || !body) {
            alert('يرجى ملء العنوان والوصف.');
            return;
        }

        const statusEl = document.getElementById('complaintStatus');
        statusEl.textContent = 'جارٍ حفظ الشكوى...';
        statusEl.style.color = 'blue';

        // إعداد بيانات الـ issue مع label "waiting" كحالة افتراضية
        const issueData = {
            title: title,
            body: body + "\n\n---\nالحالة: waiting (تلقائي)",
            labels: ["waiting"]
        };

        try {
            const response = await fetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`,
                {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${NEIGHBOR_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(issueData)
                }
            );

            if (response.ok) {
                const issue = await response.json();
                statusEl.textContent = `✅ تم حفظ الشكوى بنجاح (رقم #${issue.number}) في حالة انتظار.`;
                statusEl.style.color = 'green';
                // تفريغ الحقول
                document.getElementById('complaintTitle').value = '';
                document.getElementById('complaintBody').value = '';
            } else {
                const err = await response.json();
                statusEl.textContent = `❌ فشل الحفظ: ${err.message}`;
                statusEl.style.color = 'red';
            }
        } catch (error) {
            statusEl.textContent = `❌ خطأ في الاتصال: ${error.message}`;
            statusEl.style.color = 'red';
        }
    }

    // ========== صفحة الدفعات (مربعات ملونة فقط، بدون نصوص مكررة) ==========
    function renderPayments() {
        // بيانات افتراضية للشقق والدفعات (تستبدل بمصدر بياناتك الحقيقي)
        const apartments = [
            { name: "شقة 1", status: "paid" },
            { name: "شقة 2", status: "pending" },
            { name: "شقة 3", status: "overdue" },
            { name: "شقة 4", status: "paid" },
            { name: "شقة 5", status: "na" },
        ];

        const grid = document.getElementById('paymentGrid');
        grid.innerHTML = '';

        apartments.forEach(apt => {
            const item = document.createElement('div');
            item.className = 'payment-item';

            const square = document.createElement('div');
            square.className = `color-square ${apt.status}`;

            // التسمية تكون باسم الشقة فقط (بدون نص الحالة)
            const label = document.createElement('span');
            label.textContent = apt.name;

            item.appendChild(square);
            item.appendChild(label);
            grid.appendChild(item);
        });
    }

    // تشغيل عند تحميل الصفحة
    window.addEventListener('DOMContentLoaded', () => {
        renderPayments();
        // أي بيانات سابقة من localStorage لن تُستخدم، بل تم حذفها
    });
</script>
</body>
</html>
