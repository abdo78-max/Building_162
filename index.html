<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المبنى</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body { background: #fafafa; color: #333; }
.dash{padding:1.25rem 1rem;direction:rtl;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:19px;font-weight:500;color:#111}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-admin{background:#d4edda;color:#155724}
.b-view{background:#cce5ff;color:#004085}
.b-neighbor{background:#E6F1FB;color:#0C447C}
.b-paid{background:#EAF3DE;color:#3B6D11}
.b-pending{background:#FAEEDA;color:#854F0B}
.b-empty{background:#e9ecef;color:#6c757d}
.b-unknown{background:#FCEBEB;color:#791F1F}
.b-open{background:#EAF3DE;color:#3B6D11}
.b-invest{background:#E6F1FB;color:#0C447C}
.b-done{background:#EAF3DE;color:#3B6D11}
.pin-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.pin-row input{width:280px;font-size:13px;padding:5px 10px;border-radius:6px;border:0.5px solid #ced4da;background:#fff;color:#000;direction:ltr}
.pin-row button, .issues-form button, .detail-card button, #saveExpRow button{
padding:6px 12px;
font-size:12px;
background:#007bff;
color:#fff;
border:none;
border-radius:4px;
cursor:pointer;
}
.pin-row button:hover{background:#0056b3}

.loading-overlay{
position:fixed;
inset:0;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
font-size:14px;
color:#6c757d;
flex-direction:column;
gap:12px;
text-align:center;
padding:20px
}

.spinner{
width:32px;
height:32px;
border:3px solid #e9ecef;
border-top-color:#007bff;
border-radius:50%;
animation:spin .8s linear infinite
}

@keyframes spin{
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loadingOverlay" class="loading-overlay">
<div class="spinner"></div>
<span id="loadingText">جاري تحميل البيانات...</span>
</div>

<div class="dash" id="app" style="opacity:0;transition:opacity .3s">

<div class="top-bar">
<div>
<div style="font-size:12px;color:#6c757d;margin-bottom:3px">
لوحة إدارة المبنى
</div>

<h1>
<i class="ti ti-building"></i>
إدارة المبنى
</h1>
</div>

<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
<span class="badge b-view" id="modeBadge">وضع المشاهدة</span>
<span style="font-size:11px;color:#6c757d" id="lastUpdated"></span>
</div>
</div>

<div class="pin-row">

<input
type="password"
id="tokenInput"
placeholder="أدخل كلمة المرور أو كود الإدارة..."
/>

<button onclick="saveTokenAndLogin()" id="loginBtn">
<i class="ti ti-key"></i>
دخول
</button>

<button
onclick="logout()"
id="logoutBtn"
style="display:none; background:#dc3545;"
>
تسجيل الخروج
</button>

<button
onclick="loadData()"
style="font-size:11px;padding:4px 10px; background:#17a2b8"
>
<i class="ti ti-refresh"></i>
تحديث البيانات
</button>

</div>

</div>

<script>

// ==================== SETTINGS ====================

const GH_OWNER = "abdo78-max";
const GH_REPO  = "Building_162";
const GH_PATH  = "data.json";

const NEIGHBOR_TOKEN = "PUT_YOUR_NEW_TOKEN_HERE";

// ==================================================

let role = 'view';

function getToken() {

if (role === 'admin') {
return localStorage.getItem('bldg_admin_token');
}

if (role === 'neighbor') {
return NEIGHBOR_TOKEN;
}

return null;
}

async function loadData() {

document.getElementById('loadingOverlay').style.display = 'flex';

const token = getToken();

console.log("ROLE:", role);
console.log("TOKEN:", token);

const headers = {
"Accept": "application/vnd.github+json"
};

if (token) {
headers["Authorization"] = `Bearer ${token}`;
}

try {

const response = await fetch(
`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?nocache=${Date.now()}`,
{
headers
}
);

console.log("STATUS:", response.status);

if (!response.ok) {

const txt = await response.text();

console.log("ERROR:", txt);

throw new Error(txt);
}

const json = await response.json();

console.log("SUCCESS:", json);

document.getElementById('lastUpdated').textContent =
"تم تحميل البيانات بنجاح";

} catch(e) {

console.error(e);

alert("فشل في تحميل البيانات الحالية، يرجى التحقق من اتصال الإنترنت أو صحة الـ Token.");

}

document.getElementById('loadingOverlay').style.display = 'none';
document.getElementById('app').style.opacity = '1';
}

function saveTokenAndLogin() {

const inputVal = document.getElementById('tokenInput').value.trim();

if (!inputVal) return;

// IMPORTANT FIX
localStorage.removeItem('bldg_admin_token');

if (inputVal === '1234') {

localStorage.setItem('bldg_role', 'neighbor');

} else {

localStorage.setItem('bldg_role', 'admin');
localStorage.setItem('bldg_admin_token', inputVal);

}

checkTokenState();
loadData();
}

function checkTokenState() {

role = localStorage.getItem('bldg_role') || 'view';

const modeBadge = document.getElementById('modeBadge');
const tokenInput = document.getElementById('tokenInput');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');

if (role === 'admin') {

modeBadge.textContent = "وضع الإدارة";
modeBadge.className = "badge b-admin";

tokenInput.style.display = 'none';
loginBtn.style.display = 'none';
logoutBtn.style.display = 'inline-block';

}

else if (role === 'neighbor') {

modeBadge.textContent = "وضع الساكن";
modeBadge.className = "badge b-neighbor";

tokenInput.style.display = 'none';
loginBtn.style.display = 'none';
logoutBtn.style.display = 'inline-block';

}

else {

modeBadge.textContent = "وضع المشاهدة";
modeBadge.className = "badge b-view";

tokenInput.style.display = 'inline-block';
loginBtn.style.display = 'inline-block';
logoutBtn.style.display = 'none';

}
}

function logout() {

localStorage.clear();

role = 'view';

checkTokenState();

location.reload();
}

// IMPORTANT FIX
localStorage.clear();

checkTokenState();
loadData();

</script>

</body>
</html>
